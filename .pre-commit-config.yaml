default_install_hook_types: [pre-commit, commit-msg]

repos:
  # Default cleanups
  - repo: 'https://github.com/pre-commit/pre-commit-hooks'
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Ad-blocker - block LLM co-author trailers
  - repo: https://github.com/tmr232/precommit-ad-blocker
    rev: v1.0.0
    hooks:
      - id: ad-blocker

  # Zizmor - GitHub Actions security linting
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor

  # Ratchet - pin GitHub Actions versions
  - repo: https://github.com/tmr232/ratchet-pre-commit
    rev: v0.11.4
    hooks:
      - id: ratchet-pin

  # mdformat - format Markdown files
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
    - id: mdformat
      additional_dependencies:
      - mdformat-gfm
      - mdformat-beautysh
      - mdformat-config